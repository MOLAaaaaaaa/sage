<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>对话 — SeismicX</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
<style>
:root {
  --accent:#667eea; --accent2:#764ba2;
  --grad:linear-gradient(135deg,var(--accent),var(--accent2));
  --user-bg:#667eea; --bg:#f5f7fa;
}
* { box-sizing:border-box; }
body { background:var(--bg); height:100vh; display:flex; flex-direction:column; overflow:hidden; font-size:.95rem; }
.navbar { background:#fff !important; box-shadow:0 2px 10px rgba(0,0,0,.08); z-index:100; flex-shrink:0; }
.navbar-brand span { background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

/* Layout */
.app-body { flex:1; display:flex; overflow:hidden; }
.sidebar { width:220px; background:#fff; border-right:1px solid #eee; display:flex;
  flex-direction:column; flex-shrink:0; overflow-y:auto; }
.chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

/* Sidebar sections */
.sb-section { padding:.75rem 1rem; border-bottom:1px solid #f2f2f2; }
.sb-title { font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:#aaa; margin-bottom:.5rem; }
.sb-doc { display:flex; align-items:center; gap:.5rem; padding:.35rem .5rem;
  border-radius:8px; font-size:.82rem; cursor:pointer; transition:background .15s; }
.sb-doc:hover { background:#f5f5f5; }
.sb-doc .doc-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-doc .rm-btn { border:none; background:none; color:#ccc; font-size:.9rem; padding:0 2px;
  line-height:1; flex-shrink:0; }
.sb-doc .rm-btn:hover { color:#e53935; }
.kb-info { font-size:.78rem; color:#888; padding:.25rem .5rem; }

/* Chat messages */
.chat-messages { flex:1; overflow-y:auto; padding:1.25rem 1.5rem; }
.msg { margin-bottom:1rem; display:flex; animation:fadeIn .25s ease; }
.msg-user { justify-content:flex-end; }
.msg-assistant { justify-content:flex-start; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.bubble { max-width:72%; padding:.75rem 1rem; border-radius:16px; word-break:break-word; line-height:1.55; }
.msg-user .bubble { background:var(--user-bg); color:#fff; border-bottom-right-radius:4px; }
.msg-assistant .bubble { background:#fff; border:1px solid #e5e5e5; color:#333; border-bottom-left-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,.05); }
.bubble code { background:#f0f0f0; padding:1px 6px; border-radius:4px; font-size:.86em; font-family:'Menlo','Courier New',monospace; color:#c7254e; }
.bubble pre { background:#f6f8fa; border:1px solid #e0e0e0; border-radius:8px; padding:.75rem 1rem; overflow-x:auto; margin:.5rem 0; }
.bubble pre code { background:none; padding:0; color:inherit; font-size:.86em; }
.bubble strong { color:#5a5aed; font-weight:700; }
.bubble em { color:#555; }
.bubble ul, .bubble ol { margin:.4rem 0; padding-left:1.4rem; }
.bubble li { margin-bottom:.2rem; }
.bubble h1,.bubble h2,.bubble h3,.bubble h4,.bubble h5,.bubble h6 {
  font-weight:700; margin:.6rem 0 .3rem; line-height:1.3; color:#222;
}
.bubble h1 { font-size:1.2em; } .bubble h2 { font-size:1.1em; }
.bubble h3 { font-size:1em; } .bubble h4,.bubble h5,.bubble h6 { font-size:.95em; }
.bubble blockquote { border-left:3px solid var(--accent); margin:.5rem 0; padding:.3rem .8rem;
  background:#f8f9ff; border-radius:0 6px 6px 0; color:#555; font-style:italic; }
.bubble table { border-collapse:collapse; width:100%; margin:.5rem 0; font-size:.88em; }
.bubble th { background:#f0f2ff; font-weight:600; }
.bubble th, .bubble td { border:1px solid #dde; padding:.35rem .65rem; text-align:left; }
.bubble hr { border:none; border-top:1px solid #eee; margin:.6rem 0; }
.bubble p { margin:.3rem 0; }
.bubble a { color:var(--accent); text-decoration:underline; }
/* code block copy button */
.code-wrapper { position:relative; }
.copy-btn { position:absolute; top:.4rem; right:.4rem; border:none; background:#e0e0e0;
  border-radius:5px; font-size:.72rem; padding:2px 8px; cursor:pointer; opacity:.7; }
.copy-btn:hover { opacity:1; }
.msg-time { font-size:.72rem; color:#bbb; margin-top:.35rem; }
.msg-user .msg-time { text-align:right; }

/* Source badge */
.source-badge { display:inline-block; background:#f0f2ff; color:var(--accent); border-radius:10px;
  padding:.15rem .6rem; font-size:.75rem; margin:.4rem .2rem 0 0; }

/* Mode badge */
.mode-tag { display:inline-flex; align-items:center; gap:.3rem; font-size:.75rem;
  background:#e8f5e9; color:#2e7d32; border-radius:10px; padding:.15rem .6rem; margin-bottom:.3rem; }
.mode-tag.rag { background:#e8eaf6; color:#3949ab; }

/* Context bar */
.context-bar { padding:.4rem 1rem; background:#fff; border-top:1px solid #eee;
  display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; min-height:0; }
.ctx-chip { display:inline-flex; align-items:center; gap:.35rem; background:#e8eaf6;
  color:#3949ab; border-radius:12px; padding:.2rem .65rem; font-size:.8rem; }
.ctx-chip .rm { border:none; background:none; color:#9fa8da; font-size:.85rem; padding:0 1px; line-height:1; }
.ctx-chip .rm:hover { color:#e53935; }

/* Typing dots */
.typing { display:none; }
.typing.show { display:flex; }
.dot { width:7px; height:7px; border-radius:50%; background:#ccc; margin:2px 2px;
  animation:blink 1.4s infinite; }
.dot:nth-child(2) { animation-delay:.2s; }
.dot:nth-child(3) { animation-delay:.4s; }
@keyframes blink { 0%,60%,100%{transform:none} 30%{transform:translateY(-7px)} }

/* Input area */
.input-area { background:#fff; border-top:1px solid #eee; padding:.8rem 1.25rem; flex-shrink:0; }
.quick-row { display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:.6rem; }
.qbtn { border:1.5px solid #dde; background:#fff; color:#555; border-radius:20px;
  padding:.3rem .85rem; font-size:.82rem; cursor:pointer; transition:all .2s; }
.qbtn:hover { border-color:var(--accent); color:var(--accent); background:#f0f2ff; }
.qbtn.active { background:var(--grad); color:#fff; border-color:transparent; }

.input-row { display:flex; align-items:flex-end; gap:.5rem; }
.input-box { flex:1; border:1.5px solid #dde; border-radius:22px; overflow:hidden;
  display:flex; transition:border-color .2s; }
.input-box:focus-within { border-color:var(--accent); }
#userInput { border:none; padding:.65rem 1rem; font-size:.95rem; flex:1; resize:none;
  max-height:120px; overflow-y:auto; line-height:1.4; }
#userInput:focus { outline:none; box-shadow:none; }
.attach-btn, .send-btn { border:none; background:none; cursor:pointer; padding:.4rem .65rem;
  color:#aaa; font-size:1.15rem; transition:color .2s; }
.attach-btn:hover { color:var(--accent); }
.send-btn { background:var(--grad); color:#fff; border-radius:50%; width:38px; height:38px;
  display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
.send-btn:hover { opacity:.9; }

/* Welcome */
.welcome { text-align:center; padding:3rem 1rem; }
.welcome h3 { background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.feat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:.8rem; margin-top:1.5rem; }
.feat-card { background:#fff; border:1.5px solid #eee; border-radius:12px; padding:1rem;
  cursor:pointer; transition:all .2s; }
.feat-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 6px 20px rgba(102,126,234,.15); }
.feat-card .icon { font-size:1.8rem; margin-bottom:.5rem; background:var(--grad);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
</style>
</head>
<body>
<!-- Nav -->
<nav class="navbar navbar-expand-lg navbar-light">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="/chat">
      <i class="bi bi-activity text-primary"></i>
      <span><strong>SeismicX</strong></span>
    </a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-1 align-items-center">
        <li class="nav-item"><a class="nav-link active fw-bold" href="/chat"><i class="bi bi-chat-dots"></i> 对话</a></li>
        <li class="nav-item"><a class="nav-link" href="/knowledge"><i class="bi bi-journal-bookmark-fill"></i> 知识库</a></li>
        <li class="nav-item"><a class="nav-link" href="/skills"><i class="bi bi-lightning-charge"></i> 技能</a></li>
        <li class="nav-item"><a class="nav-link" href="/llm-settings"><i class="bi bi-cpu"></i> LLM</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="app-body">
  <!-- Sidebar: uploaded docs + KB status -->
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-title"><i class="bi bi-file-earmark-pdf me-1"></i>本次上传</div>
      <div id="sessionDocList">
        <div class="kb-info text-muted">暂无上传文档<br>点击 📎 上传 PDF</div>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-title"><i class="bi bi-journal-bookmark me-1"></i>知识库</div>
      <div id="kbInfo" class="kb-info">加载中…</div>
      <a href="/knowledge" class="btn btn-sm btn-outline-secondary w-100 mt-2" style="font-size:.78rem;">
        <i class="bi bi-gear"></i> 管理知识库
      </a>
    </div>
    <!-- Workspace directory -->
    <div class="sb-section">
      <div class="sb-title"><i class="bi bi-folder2-open me-1"></i>本地工作目录</div>
      <div class="d-flex align-items-center gap-1 mb-1">
        <div class="form-check form-switch mb-0" style="min-width:0">
          <input class="form-check-input" type="checkbox" id="wsEnabled" onchange="toggleWorkspace()">
          <label class="form-check-label" for="wsEnabled" style="font-size:.78rem">授权访问</label>
        </div>
      </div>
      <div id="wsDirRow" style="display:none">
        <input type="text" class="form-control form-control-sm" id="wsPath"
               placeholder="/data/seismic/waveform" style="font-size:.78rem;margin-bottom:.3rem">
        <button class="btn btn-sm btn-outline-secondary w-100" style="font-size:.75rem" onclick="saveWorkspace()">
          <i class="bi bi-check2"></i> 保存路径
        </button>
        <div id="wsStatus" class="kb-info mt-1"></div>
      </div>
    </div>
  </div>

  <!-- Main chat -->
  <div class="chat-area">
    <div class="chat-messages" id="chatMessages">
      <div class="welcome" id="welcomePanel">
        <h3><i class="bi bi-robot"></i> SeismicX AI 助手</h3>
        <p class="text-muted">您好！我是地震学智能助手，可以回答问题、解读文献、分析数据。</p>
        <div class="feat-grid">
          <div class="feat-card" onclick="sendQuick('如何获取 IRIS 波形数据？')">
            <div class="icon"><i class="bi bi-question-circle"></i></div>
            <div class="fw-semibold" style="font-size:.88rem;">地震学问答</div>
            <div class="text-muted" style="font-size:.78rem;">方法原理 / ObsPy 用法</div>
          </div>
          <div class="feat-card" onclick="triggerUpload()">
            <div class="icon"><i class="bi bi-file-earmark-pdf"></i></div>
            <div class="fw-semibold" style="font-size:.88rem;">上传文献</div>
            <div class="text-muted" style="font-size:.78rem;">解读论文 / RAG 问答</div>
          </div>
          <div class="feat-card" onclick="sendQuick('知识库里有哪些内容？')">
            <div class="icon"><i class="bi bi-journal-bookmark"></i></div>
            <div class="fw-semibold" style="font-size:.88rem;">知识库查询</div>
            <div class="text-muted" style="font-size:.78rem;">基于已索引文献检索</div>
          </div>
          <div class="feat-card" onclick="sendQuick('帮我对 /data/wave.mseed 做带通滤波并画图')">
            <div class="icon"><i class="bi bi-code-slash"></i></div>
            <div class="fw-semibold" style="font-size:.88rem;">数据处理</div>
            <div class="text-muted" style="font-size:.78rem;">生成 Python 代码并执行</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Typing indicator (inside chat area) -->
    <div style="padding:0 1.5rem .25rem">
      <div class="typing" id="typingIndicator">
        <div class="bubble" style="background:#fff;border:1px solid #e5e5e5;padding:.5rem .75rem;border-radius:14px;border-bottom-left-radius:4px;">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>
    </div>

    <!-- Context bar -->
    <div class="context-bar" id="contextBar" style="display:none">
      <span style="font-size:.78rem;color:#888;">引用上下文：</span>
      <div id="contextChips"></div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="quick-row">
        <button class="qbtn" onclick="sendQuick('如何做带通滤波？')">💡 滤波方法</button>
        <button class="qbtn" onclick="sendQuick('请总结这篇文献的核心方法和贡献')">📖 总结文献</button>
        <button class="qbtn" onclick="sendQuick('文献中的关键公式是什么？请解释')">🔢 解读公式</button>
        <button class="qbtn" onclick="sendQuick('帮我拾取震相')">🔍 拾取震相</button>
        <button class="qbtn" onclick="clearChat()" style="margin-left:auto">🗑 清空</button>
      </div>
      <div class="input-row">
        <div class="input-box">
          <button class="attach-btn" title="上传 PDF" onclick="triggerUpload()">
            <i class="bi bi-paperclip"></i>
          </button>
          <textarea id="userInput" rows="1" placeholder="输入问题或指令…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" onclick="sendMessage()"><i class="bi bi-send-fill"></i></button>
      </div>
    </div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".pdf" multiple style="display:none" onchange="uploadFiles(this.files)">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
const SESSION_ID = 'sess_' + Math.random().toString(36).slice(2,10);
let sessionDocs    = [];    // [{name, n_chunks}]
let chatHistory    = [];    // [{role,content}] for LLM context
let kbHasDocs      = false;
let lastCodeStdout = '';    // 上一次 sendCode 的 stdout，供下一轮绘图注入路径
let lastDataPath   = '';    // 用户消息中提取到的最近一次数据目录/文件路径

const chatMessages    = document.getElementById('chatMessages');
const typingIndicator = document.getElementById('typingIndicator');
const contextBar      = document.getElementById('contextBar');
const contextChips    = document.getElementById('contextChips');

// ── KB status ──────────────────────────────────────────────────────────────
async function loadKbStatus() {
  try {
    const r = await fetch('/api/knowledge/status');
    const d = await r.json();
    kbHasDocs = d.n_docs > 0;
    document.getElementById('kbInfo').innerHTML = d.n_docs > 0
      ? `<span style="color:#3949ab;font-weight:600">${d.n_docs} 篇</span> 文献 · ${d.n_vectors||d.n_chunks} 个片段`
      : '知识库为空';
  } catch { document.getElementById('kbInfo').textContent = '无法连接'; }
}

// ── Session doc sidebar ────────────────────────────────────────────────────
function refreshSessionSidebar() {
  const list = document.getElementById('sessionDocList');
  if (sessionDocs.length === 0) {
    list.innerHTML = '<div class="kb-info text-muted">暂无上传文档<br>点击 📎 上传 PDF</div>';
    return;
  }
  list.innerHTML = sessionDocs.map((d, i) => `
    <div class="sb-doc">
      <i class="bi bi-file-earmark-pdf text-danger" style="font-size:.9rem;flex-shrink:0"></i>
      <span class="doc-name" title="${d.name}">${d.name}</span>
      <button class="rm-btn" onclick="removeSessionDoc(${i})"><i class="bi bi-x"></i></button>
    </div>`).join('');
}

async function removeSessionDoc(i) {
  sessionDocs.splice(i, 1);
  refreshSessionSidebar();
  // 若全部移除，清空服务器端会话
  if (sessionDocs.length === 0) {
    await fetch('/api/chat/clear_session', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({session_id: SESSION_ID})
    });
  }
}

// ── File upload ────────────────────────────────────────────────────────────
function triggerUpload() { document.getElementById('fileInput').click(); }

async function uploadFiles(files) {
  if (!files || files.length === 0) return;
  for (const file of files) {
    if (!file.name.toLowerCase().endsWith('.pdf')) continue;
    addMsg('assistant', `📎 正在上传「${file.name}」…`);
    const fd = new FormData();
    fd.append('file', file);
    fd.append('session_id', SESSION_ID);
    try {
      const r = await fetch('/api/chat/upload', {method:'POST', body:fd});
      const d = await r.json();
      if (d.ok) {
        sessionDocs.push({name: file.name, n_chunks: d.n_chunks});
        refreshSessionSidebar();
        addMsg('assistant',
          `✅ **${file.name}** 已加载（${d.n_pages} 页，${d.n_chunks} 个片段）\n\n` +
          `现在可以直接问我关于这篇文献的任何问题，回答将自动引用文献内容。`);
      } else {
        addMsg('assistant', `✗ 上传失败：${d.error}`);
      }
    } catch(e) {
      addMsg('assistant', `✗ 上传出错：${e.message}`);
    }
  }
  document.getElementById('fileInput').value = '';
}

// ── Message rendering ──────────────────────────────────────────────────────
function addMsg(role, content, sources=[]) {
  const welcome = document.getElementById('welcomePanel');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg msg-${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  // 将参考文献作为文本追加到回答末尾
  let fullContent = content;
  if (sources && sources.length) {
    fullContent += '\n\n---\n**参考文献**\n' +
      sources.map((s, i) => `[${i + 1}] ${s}`).join('\n');
  }
  bubble.innerHTML = formatText(fullContent);

  div.appendChild(bubble);

  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  div.appendChild(timeEl);

  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

// ── Markdown renderer (marked.js) ─────────────────────────────────────────
marked.setOptions({
  breaks: true,   // \n → <br> inside paragraphs
  gfm: true,
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, {language: lang}).value; } catch {}
    }
    return hljs.highlightAuto(code).value;
  }
});

// Custom renderer: wrap pre/code in a copy-button wrapper
const renderer = new marked.Renderer();
renderer.code = (code, lang) => {
  const highlighted = (lang && hljs.getLanguage(lang))
    ? hljs.highlight(code, {language: lang}).value
    : hljs.highlightAuto(code).value;
  const langLabel = lang ? `<span style="font-size:.7rem;color:#aaa;margin-right:.5rem">${lang}</span>` : '';
  return `<div class="code-wrapper">
    <pre><code class="hljs">${highlighted}</code></pre>
    ${langLabel}<button class="copy-btn" onclick="copyCode(this)">复制</button>
  </div>`;
};
marked.use({ renderer });

function formatText(text) {
  try {
    return marked.parse(text);
  } catch(e) {
    // fallback: plain text with line breaks
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
}

function copyCode(btn) {
  const code = btn.closest('.code-wrapper').querySelector('code');
  navigator.clipboard.writeText(code.innerText).then(() => {
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = '复制', 2000);
  });
}

// ── Workspace directory ────────────────────────────────────────────────────
let wsEnabled = false;
let wsPath = '';

async function loadWorkspace() {
  try {
    const r = await fetch('/api/workspace/config');
    const d = await r.json();
    wsEnabled = d.enabled || false;
    wsPath = d.path || '';
    document.getElementById('wsEnabled').checked = wsEnabled;
    document.getElementById('wsPath').value = wsPath;
    document.getElementById('wsDirRow').style.display = wsEnabled ? 'block' : 'none';
    if (wsEnabled && wsPath) updateWsStatus(wsPath);
  } catch {}
}

function toggleWorkspace() {
  wsEnabled = document.getElementById('wsEnabled').checked;
  document.getElementById('wsDirRow').style.display = wsEnabled ? 'block' : 'none';
  saveWorkspace();
}

async function saveWorkspace() {
  wsPath = document.getElementById('wsPath').value.trim();
  wsEnabled = document.getElementById('wsEnabled').checked;
  await fetch('/api/workspace/config', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ enabled: wsEnabled, path: wsPath })
  });
  if (wsEnabled && wsPath) updateWsStatus(wsPath);
}

async function updateWsStatus(path) {
  const el = document.getElementById('wsStatus');
  try {
    const r = await fetch(`/api/workspace/ls?path=${encodeURIComponent(path)}`);
    const d = await r.json();
    if (d.ok) {
      el.innerHTML = `<span style="color:#3949ab">${d.entries.length} 个文件/目录</span>`;
    } else {
      el.innerHTML = `<span style="color:#e53935">${d.error}</span>`;
    }
  } catch { el.textContent = '无法访问'; }
}

// ── Typing indicator ───────────────────────────────────────────────────────
function showTyping() {
  typingIndicator.classList.add('show');
  chatMessages.scrollTop = chatMessages.scrollHeight;
}
function hideTyping() { typingIndicator.classList.remove('show'); }

// ── LLM 路由判断 ───────────────────────────────────────────────────────────
async function classifyIntent(text) {
  // 快速路径：明确的绝对路径操作（如 /data/... 或 ~/...），不是问句
  if (/(?:^|\s)[/~][\w./\-]{4,}/.test(text) && !text.trim().endsWith('?')) {
    return 'code';
  }
  try {
    const r = await fetch('/api/chat/route', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, kb_has_docs: kbHasDocs || sessionDocs.length > 0}),
    });
    const d = await r.json();
    return d.intent || 'qa';
  } catch (e) {
    // 网络失败时降级到简单正则
    if (/(绘制|画图|滤波|频谱|读取|执行|运行|waveform|\.sac|\.mseed)/i.test(text)) return 'code';
    return 'qa';
  }
}

// ── Send message ───────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text) return;

  addMsg('user', text);
  chatHistory.push({role:'user', content:text});
  input.value = '';
  autoResize(input);
  showTyping();

  try {
    // 用 LLM 判断意图（code / qa / chat）
    const intent = await classifyIntent(text);

    if (intent === 'code') {
      await sendCode(text);                              // 生成并执行技能代码
    } else if (intent === 'qa' || sessionDocs.length > 0 || kbHasDocs) {
      await sendRag(text);                               // 知识问答 + RAG 检索
    } else {
      await sendNormal(text);                            // 普通对话
    }
  } catch(e) {
    hideTyping();
    addMsg('assistant', `✗ 请求失败：${e.message}`);
  }
}

// ── CodeEngine 技能执行 ────────────────────────────────────────────────────
async function sendCode(text) {
  // ── 从当前消息或历史中提取数据路径 ────────────────────────────────────
  // 1. 从用户当前消息提取路径（如 "看下目录/data/seismic/waveform"）
  const pathInMsg = text.match(/([~\/][\w.\-/]{4,})/);
  if (pathInMsg) lastDataPath = pathInMsg[1];

  // ── 对绘图请求注入数据目录上下文 ───────────────────────────────────────
  let enrichedText = text;
  const isPlotReq = /(绘制|画图|画波形|绘图|可视化|plot)/i.test(text);
  if (isPlotReq && lastDataPath) {
    enrichedText += `\n（数据目录：${lastDataPath}，请直接用 read_stream_from_dir 读取并绘图，不要列目录，不要使用临时目录）`;
  }

  const r = await fetch('/api/chat/code', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({message: enrichedText, session_id: SESSION_ID}),
  });
  const d = await r.json();
  hideTyping();

  if (!d.ok) {
    addMsg('assistant', `✗ 技能调用出错：${d.error}`);
    return;
  }

  // ── 直接构建 DOM，完全避免 markdown 解析问题 ──────────────────────────
  const welcome = document.getElementById('welcomePanel');
  if (welcome) welcome.remove();

  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg msg-assistant';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.maxWidth = '82%';

  // 1. 技能标签
  if (d.skill_used) {
    const tag = document.createElement('div');
    tag.style.cssText = 'font-size:.78rem;color:#3949ab;font-weight:600;margin-bottom:.5rem;';
    tag.innerHTML = `🔧 技能：<code style="background:#e8eaf6;padding:1px 6px;border-radius:4px;font-size:.85em">${d.skill_used}</code>`;
    bubble.appendChild(tag);
  }

  // 2. 执行状态
  const status = document.createElement('div');
  status.style.cssText = 'font-weight:600;margin-bottom:.4rem;color:' + (d.success ? '#2e7d32' : '#c62828') + ';';
  status.textContent = d.success ? '✅ 代码执行成功' : '❌ 执行失败';
  bubble.appendChild(status);

  // 3. 标准输出（只显示一次，去掉 [FIGURE] 行）
  const cleanOut = (d.stdout || '')
    .split('\n')
    .filter(l => !l.startsWith('[FIGURE]') && !l.startsWith('[GMT_SCRIPT]'))
    .join('\n').trim();
  if (cleanOut) {
    const pre = document.createElement('pre');
    pre.style.cssText = 'background:#f6f8fa;border:1px solid #e0e0e0;border-radius:8px;padding:.6rem .8rem;overflow-x:auto;font-size:.82em;margin:.3rem 0;white-space:pre-wrap;word-break:break-all;';
    pre.textContent = cleanOut;
    bubble.appendChild(pre);
  } else if (d.success && lastDataPath && !d.figures.length) {
    // stdout 为空且无图时，至少显示访问了哪个目录
    const pathNote = document.createElement('div');
    pathNote.style.cssText = 'font-size:.8rem;color:#666;margin-top:.25rem;word-break:break-all;';
    pathNote.textContent = `📁 ${lastDataPath}`;
    bubble.appendChild(pathNote);
  }

  // 4. 失败时展示代码
  if (!d.success && d.code) {
    const label = document.createElement('div');
    label.style.cssText = 'font-size:.78rem;color:#888;margin-top:.5rem;margin-bottom:.2rem;';
    label.textContent = '生成的代码：';
    const pre = document.createElement('pre');
    pre.style.cssText = 'background:#fff8f8;border:1px solid #fcc;border-radius:8px;padding:.6rem .8rem;overflow-x:auto;font-size:.82em;margin:0;white-space:pre-wrap;';
    pre.textContent = d.code;
    bubble.appendChild(label);
    bubble.appendChild(pre);
  }

  // 5. 图像（内嵌 base64，直接在气泡里显示）+ 下载按钮
  if (d.figures && d.figures.length) {
    d.figures.forEach(fig => {
      // 图像容器
      const figWrap = document.createElement('div');
      figWrap.style.cssText = 'margin-top:.75rem;';

      // 图像本体
      const imgSrc = `data:image/png;base64,${fig.data}`;
      const img = document.createElement('img');
      img.src = imgSrc;
      img.alt = fig.name;
      img.style.cssText = 'max-width:100%;border-radius:8px 8px 0 0;border:1px solid #e0e0e0;border-bottom:none;display:block;cursor:zoom-in;';
      img.title = '点击放大';
      img.onclick = () => {
        const win = window.open();
        win.document.write(`<!DOCTYPE html><html><body style="margin:0;background:#111">
          <img src="${imgSrc}" style="max-width:100%;display:block;margin:auto">
          </body></html>`);
      };
      figWrap.appendChild(img);

      // 下载工具栏
      const toolbar = document.createElement('div');
      toolbar.style.cssText = 'display:flex;gap:.4rem;padding:.4rem .6rem;background:#f6f8fa;border:1px solid #e0e0e0;border-radius:0 0 8px 8px;flex-wrap:wrap;align-items:center;';

      // 文件名标签
      const fnLabel = document.createElement('span');
      fnLabel.style.cssText = 'font-size:.75rem;color:#888;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
      fnLabel.textContent = fig.name;
      toolbar.appendChild(fnLabel);

      // 下载图像按钮
      const dlImg = document.createElement('a');
      dlImg.href = imgSrc;
      dlImg.download = fig.name;
      dlImg.style.cssText = 'font-size:.75rem;padding:.18rem .55rem;border-radius:4px;background:#e8f4fd;color:#1565c0;border:1px solid #bbdefb;text-decoration:none;white-space:nowrap;cursor:pointer;';
      dlImg.textContent = '⬇ 图像';
      toolbar.appendChild(dlImg);

      // GMT 脚本下载按钮（仅 GMT 图有）
      if (fig.gmt_script) {
        const scriptBlob = new Blob([fig.gmt_script.content], {type: 'text/plain'});
        const scriptUrl  = URL.createObjectURL(scriptBlob);
        const dlScript   = document.createElement('a');
        dlScript.href     = scriptUrl;
        dlScript.download = fig.gmt_script.name;
        dlScript.style.cssText = 'font-size:.75rem;padding:.18rem .55rem;border-radius:4px;background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9;text-decoration:none;white-space:nowrap;cursor:pointer;';
        dlScript.textContent = '⬇ GMT脚本';
        toolbar.appendChild(dlScript);
      }

      figWrap.appendChild(toolbar);
      bubble.appendChild(figWrap);
    });
  }

  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});

  msgDiv.appendChild(bubble);
  msgDiv.appendChild(timeEl);
  chatMessages.appendChild(msgDiv);
  chatMessages.scrollTop = chatMessages.scrollHeight;

  // 保存 stdout 供下一轮绘图注入路径
  if (d.stdout) lastCodeStdout = d.stdout;

  // 记录到 chatHistory（简洁摘要，供后续 RAG 上下文使用）
  const summary = (d.skill_used ? `[技能:${d.skill_used}] ` : '') +
    (d.success ? '执行成功' : '执行失败') +
    (cleanOut ? '\n输出:\n' + cleanOut.slice(0, 300) : '');
  chatHistory.push({role:'assistant', content: summary});
}

async function sendRag(text) {
  // 自动判断是否为文献解读请求
  const paperKeywords = ['总结', '解读', '摘要', '结论', '方法', '论文', '文献', '这篇', '本文', '作者'];
  const isPaperMode = paperKeywords.some(k => text.includes(k)) && sessionDocs.length > 0;
  const mode = isPaperMode ? 'paper_read' : 'rag';

  const r = await fetch('/api/chat/rag', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      message:    text,
      session_id: SESSION_ID,
      mode:       mode,
      history:    chatHistory.slice(-8),
      workspace:  wsEnabled ? wsPath : '',
    }),
  });
  const d = await r.json();
  hideTyping();

  const answer  = d.response || '（无回复）';
  const sources = d.sources  || [];
  addMsg('assistant', answer, sources);
  chatHistory.push({role:'assistant', content:answer});
}

async function sendNormal(text) {
  const r = await fetch('/api/chat', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({message: text, workspace: wsEnabled ? wsPath : ''}),
  });
  const d = await r.json();
  hideTyping();

  const answer = d.response || '（无回复）';
  addMsg('assistant', answer);
  chatHistory.push({role:'assistant', content:answer});

  // Waveform rendering (existing functionality)
  if (d.waveform_data?.length) {
    renderWaveform(chatMessages.lastElementChild, d.waveform_data,
      d.waveform_title || '', d.picks_data || []);
  }
  if (d.pick_task_id && d.waveform_data) {
    pollPickTask(d.pick_task_id, chatMessages.lastElementChild, d.waveform_data, d.waveform_title || '');
  }
  if (d.pick_task_id && !d.waveform_data) {
    pollBatchTask(d.pick_task_id, chatMessages.lastElementChild, d.picks_file || '');
  }
}

function sendQuick(msg) {
  document.getElementById('userInput').value = msg;
  sendMessage();
}

// ── Keyboard & resize ──────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Clear chat ─────────────────────────────────────────────────────────────
function clearChat() {
  if (!confirm('确定清空对话记录？')) return;
  chatHistory = [];
  chatMessages.innerHTML = `<div class="welcome" id="welcomePanel">
    <h3><i class="bi bi-robot"></i> SeismicX AI 助手</h3>
    <p class="text-muted">对话已清空，有什么可以帮您？</p>
  </div>`;
  contextBar.style.display = 'none';
  lastCodeStdout = '';   // 清空路径缓存
  lastDataPath   = '';   // 清空数据目录缓存
  // 同步重置 CodeEngine 历史，避免旧路径/变量污染新对话
  fetch('/api/chat/code/reset', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({session_id: SESSION_ID}),
  }).catch(() => {});
}

// ── Waveform (keep existing Plotly logic) ──────────────────────────────────
const PHASE_COLORS = {Pg:'#e74c3c',Sg:'#3498db',Pn:'#c0392b',Sn:'#2980b9',P:'#e67e22',S:'#1abc9c'};

function renderWaveform(container, traces, title, picks=[]) {
  const plotDiv = document.createElement('div');
  plotDiv.style.cssText = 'width:100%;margin-top:10px;border-radius:8px;overflow:hidden;';
  const h = Math.max(200, traces.length*130);
  plotDiv.style.height = h + 'px';
  container.appendChild(plotDiv);

  const plotlyTraces = traces.map((tr,i) => ({
    x:tr.times, y:tr.amplitudes, type:'scatter', mode:'lines', name:tr.label,
    line:{width:1}, xaxis:i===0?'x':`x${i+1}`, yaxis:i===0?'y':`y${i+1}`,
  }));
  const layout = {title:{text:title,font:{size:13}}, margin:{t:40,b:40,l:70,r:20},
    height:h, showlegend:false, paper_bgcolor:'#fff', plot_bgcolor:'#fafafa',
    grid:{rows:traces.length,columns:1,pattern:'independent',roworder:'top to bottom'},
    shapes:[], annotations:[]};
  traces.forEach((tr,i) => {
    const ax = i===0?'':''+( i+1);
    layout[`xaxis${ax}`] = {title:i===traces.length-1?'Time (s)':'',showticklabels:i===traces.length-1,gridcolor:'#e0e0e0'};
    layout[`yaxis${ax}`] = {title:tr.label,tickvals:[-1,0,1],ticktext:['-1','0','1'],gridcolor:'#e0e0e0',zeroline:true,zerolinecolor:'#aaa',zerolinewidth:1};
  });
  if (picks?.length) {
    picks.forEach(pick => {
      const color = PHASE_COLORS[pick.phase]||'#999';
      traces.forEach((_,i) => {
        const xr = i===0?'x':`x${i+1}`, yr = i===0?'y':`y${i+1}`;
        layout.shapes.push({type:'line',xref:xr,yref:yr,x0:pick.time_s,x1:pick.time_s,y0:-1.1,y1:1.1,line:{color,width:1.5,dash:'dot'}});
      });
      layout.annotations.push({x:pick.time_s,y:1.05,xref:'x',yref:'y',
        text:`<b>${pick.phase}</b><br>${pick.confidence.toFixed(2)}`,showarrow:true,arrowhead:2,
        arrowsize:.8,ax:0,ay:-20,font:{size:10,color},arrowcolor:color,
        bgcolor:'rgba(255,255,255,0.8)',bordercolor:color,borderwidth:1,borderpad:2});
    });
  }
  Plotly.newPlot(plotDiv, plotlyTraces, layout, {responsive:true});
  setTimeout(()=>{chatMessages.scrollTop=chatMessages.scrollHeight;},300);
}

function pollPickTask(taskId, msgEl, waveformData, title, interval=3000) {
  const bubble = msgEl.querySelector('.bubble');
  const spinner = document.createElement('div');
  spinner.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span> 拾取中…';
  spinner.style.cssText='margin-top:8px;color:var(--accent);font-size:.82rem;';
  bubble.appendChild(spinner);
  const timer = setInterval(async()=>{
    const r = await fetch(`/api/chat_picks/${taskId}`);
    const d = await r.json();
    if (d.status==='running') return;
    clearInterval(timer); spinner.remove();
    if (d.status==='completed') {
      const old = msgEl.querySelector('.js-plotly-plot');
      if (old) old.remove();
      renderWaveform(msgEl, waveformData, title.replace('拾取中…','震相拾取结果'), d.picks||[]);
      const sum = document.createElement('div');
      sum.style.cssText='margin-top:6px;font-size:.82rem;color:#555;';
      sum.innerHTML = d.picks?.length ? `✓ 检测到 <b>${d.picks.length}</b> 个震相` : '⚠️ 未检测到震相';
      bubble.appendChild(sum);
    }
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }, interval);
}

function pollBatchTask(taskId, msgEl, picksFile, interval=3000) {
  const bubble = msgEl.querySelector('.bubble');
  const bar = document.createElement('div');
  bar.innerHTML = `
    <div style="background:#f0f0f0;border-radius:4px;height:8px;overflow:hidden;margin-top:10px">
      <div id="bar-${taskId}" style="height:100%;width:5%;background:var(--grad);border-radius:4px;transition:width .5s"></div>
    </div>
    <div id="lab-${taskId}" style="font-size:.78rem;color:#666;margin-top:4px">初始化中…</div>`;
  bubble.appendChild(bar);
  const timer = setInterval(async()=>{
    const r = await fetch(`/api/task/${taskId}`);
    const d = await r.json();
    const prog = d.progress||{};
    const barEl = document.getElementById(`bar-${taskId}`);
    const labEl = document.getElementById(`lab-${taskId}`);
    if (d.status==='running') {
      const pct = prog.total>0 ? Math.max(5,Math.round(prog.current/prog.total*100)) : 10;
      if (barEl) barEl.style.width=pct+'%';
      if (labEl) labEl.textContent=`${prog.current||0}/${prog.total||'?'} 台站 | ${prog.n_picks||0} 震相`;
      return;
    }
    clearInterval(timer); bar.remove();
    const sum = document.createElement('div');
    sum.style.cssText='margin-top:8px;font-size:.82rem;';
    if (d.status==='completed') {
      const re = d.result||{};
      sum.innerHTML=`✅ 完成：${re.n_stations||'?'} 台站，${re.n_picks||'?'} 个震相`;
    } else {
      sum.innerHTML=`❌ 失败：${d.stderr?.slice(-200)||d.status}`;
    }
    bubble.appendChild(sum);
    chatMessages.scrollTop=chatMessages.scrollHeight;
  }, interval);
}
